name: Build and Release OVA

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build OVA
        run: nix build --cores 1 --print-build-logs

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build OVA
        run: nix build --cores 1 --print-build-logs

      - name: Generate tag name
        id: tag
        run: echo "name=v$(date +%Y.%m.%d-%H_%M_%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            result/vm-part-*
            result/reassemble.sh
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download Instructions

            1. Download all `vm-part-*` files and `reassemble.sh`
            2. Run `./reassemble.sh` to reconstruct the VM image
            3. Import `rrcc-vm.ova` into VirtualBox

            The VM includes:
            - XFCE Desktop Environment
            - GCC for x86_64
            - ARM cross-compilation toolchain
            - Default user: `student` / password: `student`
